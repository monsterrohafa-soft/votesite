<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>계약서 확인 및 전자서명</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.8;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    /* Loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #888; font-size: 14px; }

    /* Error */
    .error-wrap {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 12px;
      padding: 20px;
      text-align: center;
    }
    .error-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #fee2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: #dc2626;
    }
    .error-title { font-size: 18px; font-weight: 700; color: #1a1a1a; }
    .error-desc { font-size: 14px; color: #888; }

    /* Document */
    .document-wrap {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .document {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 20px rgba(0, 0, 0, 0.08);
      padding: 48px 40px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 20px;
    }
    .toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .toolbar-btn:hover { background: #f9f9f9; border-color: #bbb; }
    .toolbar-btn svg { width: 16px; height: 16px; }

    /* Sections */
    .section { margin-bottom: 32px; }
    .section:last-child { margin-bottom: 0; }

    /* Header section */
    .section-header {
      text-align: center;
      padding: 24px 0 32px;
      border-bottom: 2px solid #1a1a1a;
      margin-bottom: 32px;
    }
    .section-header h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1.4;
    }
    .section-header .date {
      margin-top: 12px;
      font-size: 14px;
      color: #666;
    }

    /* Section title */
    .section-title {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
      color: #1a1a1a;
    }

    /* Text content */
    .section-content {
      font-size: 15px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }

    /* List */
    .section-list {
      list-style: none;
      counter-reset: list-counter;
    }
    .section-list li {
      counter-increment: list-counter;
      padding: 6px 0 6px 28px;
      position: relative;
      font-size: 15px;
      color: #333;
      line-height: 1.7;
    }
    .section-list li::before {
      content: counter(list-counter) ".";
      position: absolute;
      left: 0;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* Fees */
    .section-fees {
      background: #fafafa;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 20px 24px;
      font-size: 15px;
      line-height: 1.9;
      color: #333;
      white-space: pre-line;
    }

    /* Signature area */
    .signature-area {
      margin-top: 48px;
      padding-top: 32px;
      border-top: 2px solid #1a1a1a;
    }
    .signature-area h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }

    /* Signed display */
    .signed-notice {
      text-align: center;
      padding: 16px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 600;
      color: #16a34a;
    }
    .signed-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .signed-image {
      max-width: 300px;
      max-height: 150px;
      border: 1px solid #eee;
      border-radius: 4px;
      background: #fff;
    }
    .signed-meta {
      text-align: center;
      font-size: 14px;
      color: #666;
      line-height: 1.8;
    }
    .signed-meta strong { color: #1a1a1a; }

    /* Signature form */
    .sign-form { display: flex; flex-direction: column; gap: 20px; }

    .canvas-wrap {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 4px;
      background: #fafafa;
      position: relative;
    }
    .canvas-wrap.active { border-color: #1a1a1a; background: #fff; }
    .canvas-label {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #bbb;
      font-size: 14px;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .canvas-label.hidden { opacity: 0; }

    #signatureCanvas {
      display: block;
      width: 100%;
      height: 200px;
      cursor: crosshair;
      touch-action: none;
    }

    .canvas-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .btn-clear {
      padding: 6px 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .btn-clear:hover { background: #f5f5f5; border-color: #bbb; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: #555;
    }
    .form-group input {
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: #1a1a1a; }

    .btn-sign {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      background: #1a1a1a;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    .btn-sign:hover { opacity: 0.85; }
    .btn-sign:disabled {
      background: #ccc;
      cursor: not-allowed;
      opacity: 1;
    }

    .sign-error {
      text-align: center;
      font-size: 13px;
      color: #dc2626;
      display: none;
    }

    /* Success overlay */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .success-overlay.show { display: flex; }
    .success-box {
      background: #fff;
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    .success-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #f0fdf4;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      margin-bottom: 16px;
    }
    .success-box h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-box p { font-size: 14px; color: #666; margin-bottom: 24px; }
    .btn-reload {
      padding: 12px 32px;
      border: none;
      border-radius: 8px;
      background: #1a1a1a;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* Mobile */
    @media (max-width: 640px) {
      .document { padding: 32px 20px; }
      .section-header h1 { font-size: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .section-title { font-size: 16px; }
      .section-content, .section-list li, .section-fees { font-size: 14px; }
    }

    /* Print */
    @media print {
      body { background: #fff; font-size: 12pt; }
      .toolbar, .sign-form, .canvas-wrap, .canvas-actions, .btn-sign,
      .sign-error, .success-overlay, .signed-notice { display: none !important; }

      .document-wrap {
        display: block !important;
        max-width: 100%;
        padding: 0;
        margin: 0;
      }
      .document {
        box-shadow: none;
        border-radius: 0;
        padding: 20mm 15mm;
      }
      .section-header { border-bottom-width: 1pt; }
      .signature-area { border-top-width: 1pt; }
      .section-fees { border: 1pt solid #ccc; }

      .signed-info { display: flex !important; }
      .signed-image { max-width: 200px; border: 1pt solid #ccc; }

      .signature-area {
        page-break-before: auto;
        page-break-inside: avoid;
      }
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="loading-wrap" id="loadingState">
    <div class="spinner"></div>
    <div class="loading-text">계약서를 불러오는 중...</div>
  </div>

  <!-- Error -->
  <div class="error-wrap" id="errorState">
    <div class="error-icon">!</div>
    <div class="error-title" id="errorTitle">오류</div>
    <div class="error-desc" id="errorDesc"></div>
  </div>

  <!-- Document -->
  <div class="document-wrap" id="documentState">
    <div class="toolbar">
      <button class="toolbar-btn" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
        </svg>
        PDF 다운로드
      </button>
    </div>

    <div class="document">
      <div id="sectionsContainer"></div>

      <div class="signature-area">
        <h2>서명</h2>

        <!-- Signed state -->
        <div id="signedDisplay" style="display: none;">
          <div class="signed-notice">이미 서명이 완료된 계약서입니다</div>
          <div class="signed-info">
            <img id="signedImage" class="signed-image" alt="서명 이미지">
            <div class="signed-meta" id="signedMeta"></div>
          </div>
        </div>

        <!-- Sign form -->
        <div id="signForm" style="display: none;">
          <div class="sign-form">
            <div>
              <div class="canvas-wrap" id="canvasWrap">
                <span class="canvas-label" id="canvasLabel">여기에 서명해 주세요</span>
                <canvas id="signatureCanvas"></canvas>
              </div>
              <div class="canvas-actions">
                <button class="btn-clear" id="btnClear" type="button">지우기</button>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="signerName">서명자 이름</label>
                <input type="text" id="signerName" placeholder="홍길동">
              </div>
              <div class="form-group">
                <label for="signerPhone">전화번호</label>
                <input type="tel" id="signerPhone" placeholder="010-1234-5678">
              </div>
            </div>

            <div class="sign-error" id="signError"></div>

            <button class="btn-sign" id="btnSign" type="button">서명 완료</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-box">
      <div class="success-icon">&#10003;</div>
      <h3>서명이 완료되었습니다</h3>
      <p>계약서에 전자서명이 성공적으로 등록되었습니다.</p>
      <button class="btn-reload" onclick="location.reload()">확인</button>
    </div>
  </div>

<script>
(function() {
  const API_BASE = window.location.origin;
  const code = new URLSearchParams(window.location.search).get('code');

  const loadingEl = document.getElementById('loadingState');
  const errorEl = document.getElementById('errorState');
  const documentEl = document.getElementById('documentState');

  // --- State management ---
  function showLoading() {
    loadingEl.style.display = 'flex';
    errorEl.style.display = 'none';
    documentEl.style.display = 'none';
  }

  function showError(title, desc) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'flex';
    documentEl.style.display = 'none';
    document.getElementById('errorTitle').textContent = title;
    document.getElementById('errorDesc').textContent = desc || '';
  }

  function showDocument() {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'none';
    documentEl.style.display = 'block';
  }

  // --- Init ---
  if (!code) {
    showError('계약서를 찾을 수 없습니다', '올바른 링크로 접속해 주세요.');
    return;
  }

  showLoading();
  loadContract();

  async function loadContract() {
    try {
      const res = await fetch(`${API_BASE}/api/contract?code=${encodeURIComponent(code)}`);
      if (!res.ok) {
        if (res.status === 404) {
          showError('계약서를 찾을 수 없습니다', '해당 후보의 계약서가 존재하지 않습니다.');
        } else {
          showError('오류가 발생했습니다', '잠시 후 다시 시도해 주세요.');
        }
        return;
      }

      const contract = await res.json();

      if (contract.status === 'draft') {
        showError('아직 발송되지 않은 계약서입니다', '계약서가 준비되면 다시 안내드리겠습니다.');
        return;
      }

      renderContract(contract);
      showDocument();

      if (contract.status === 'signed') {
        showSignedState(contract.signature);
      } else {
        showSignForm();
      }
    } catch (err) {
      showError('네트워크 오류', '인터넷 연결을 확인해 주세요.');
    }
  }

  // --- Render sections ---
  function renderContract(contract) {
    const container = document.getElementById('sectionsContainer');
    container.innerHTML = '';

    document.title = `계약서 - ${contract.candidateName}`;

    contract.sections.forEach(function(section) {
      var el = document.createElement('div');
      el.className = 'section';

      switch (section.type) {
        case 'header':
          el.innerHTML =
            '<div class="section-header">' +
              '<h1>' + escapeHtml(section.title) + '</h1>' +
              '<div class="date">' + formatDate(contract.createdAt) + '</div>' +
            '</div>';
          break;

        case 'text':
          el.innerHTML =
            '<h3 class="section-title">' + escapeHtml(section.title) + '</h3>' +
            '<div class="section-content">' + escapeHtml(section.content || '') + '</div>';
          break;

        case 'list':
          var items = (section.items || []).map(function(item) {
            return '<li>' + escapeHtml(item) + '</li>';
          }).join('');
          el.innerHTML =
            '<h3 class="section-title">' + escapeHtml(section.title) + '</h3>' +
            '<ol class="section-list">' + items + '</ol>';
          break;

        case 'fees':
          el.innerHTML =
            '<h3 class="section-title">' + escapeHtml(section.title) + '</h3>' +
            '<div class="section-fees">' + escapeHtml(section.content || '') + '</div>';
          break;

        default:
          el.innerHTML =
            '<h3 class="section-title">' + escapeHtml(section.title || '') + '</h3>' +
            '<div class="section-content">' + escapeHtml(section.content || '') + '</div>';
      }

      container.appendChild(el);
    });
  }

  // --- Signed state ---
  function showSignedState(signature) {
    document.getElementById('signedDisplay').style.display = 'block';
    document.getElementById('signForm').style.display = 'none';

    if (signature && signature.dataUrl) {
      document.getElementById('signedImage').src = signature.dataUrl;
    }

    var meta = '';
    if (signature) {
      meta += '<div><strong>서명자:</strong> ' + escapeHtml(signature.signerName || '') + '</div>';
      if (signature.signerPhone) {
        meta += '<div><strong>전화번호:</strong> ' + escapeHtml(formatPhone(signature.signerPhone)) + '</div>';
      }
      if (signature.signedAt) {
        meta += '<div><strong>서명일시:</strong> ' + escapeHtml(formatDateTime(signature.signedAt)) + '</div>';
      }
    }
    document.getElementById('signedMeta').innerHTML = meta;
  }

  // --- Sign form ---
  function showSignForm() {
    document.getElementById('signedDisplay').style.display = 'none';
    document.getElementById('signForm').style.display = 'block';
    initSignaturePad();
  }

  // --- Signature pad ---
  var isDrawing = false;
  var hasDrawn = false;
  var lastX = 0;
  var lastY = 0;

  function initSignaturePad() {
    var canvas = document.getElementById('signatureCanvas');
    var ctx = canvas.getContext('2d');
    var wrap = document.getElementById('canvasWrap');
    var label = document.getElementById('canvasLabel');

    function resizeCanvas() {
      var rect = canvas.getBoundingClientRect();
      var ratio = window.devicePixelRatio || 1;
      canvas.width = rect.width * ratio;
      canvas.height = rect.height * ratio;
      ctx.scale(ratio, ratio);
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
    }

    resizeCanvas();
    window.addEventListener('resize', function() {
      if (!hasDrawn) resizeCanvas();
    });

    function getPos(e) {
      var rect = canvas.getBoundingClientRect();
      var touch = e.touches ? e.touches[0] : e;
      return {
        x: touch.clientX - rect.left,
        y: touch.clientY - rect.top
      };
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      var pos = getPos(e);
      lastX = pos.x;
      lastY = pos.y;
      wrap.classList.add('active');
      label.classList.add('hidden');
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      var pos = getPos(e);
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(pos.x, pos.y);
      ctx.stroke();
      lastX = pos.x;
      lastY = pos.y;
      hasDrawn = true;
    }

    function endDraw(e) {
      if (isDrawing) {
        isDrawing = false;
      }
    }

    // Mouse events
    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);

    // Touch events
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);
    canvas.addEventListener('touchcancel', endDraw);

    // Clear
    document.getElementById('btnClear').addEventListener('click', function() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      hasDrawn = false;
      wrap.classList.remove('active');
      label.classList.remove('hidden');
    });

    // Submit
    document.getElementById('btnSign').addEventListener('click', submitSignature);
  }

  async function submitSignature() {
    var errorEl = document.getElementById('signError');
    errorEl.style.display = 'none';

    var signerName = document.getElementById('signerName').value.trim();
    var signerPhone = document.getElementById('signerPhone').value.trim();

    if (!hasDrawn) {
      errorEl.textContent = '서명을 입력해 주세요.';
      errorEl.style.display = 'block';
      return;
    }
    if (!signerName) {
      errorEl.textContent = '서명자 이름을 입력해 주세요.';
      errorEl.style.display = 'block';
      return;
    }
    if (!signerPhone) {
      errorEl.textContent = '전화번호를 입력해 주세요.';
      errorEl.style.display = 'block';
      return;
    }

    var canvas = document.getElementById('signatureCanvas');
    var signatureDataUrl = canvas.toDataURL('image/png');

    var btn = document.getElementById('btnSign');
    btn.disabled = true;
    btn.textContent = '처리 중...';

    try {
      var res = await fetch(API_BASE + '/api/contract?action=sign', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          code: code,
          signatureDataUrl: signatureDataUrl,
          signerName: signerName,
          signerPhone: signerPhone
        })
      });

      if (!res.ok) {
        var data = await res.json().catch(function() { return {}; });
        throw new Error(data.error || '서명 처리에 실패했습니다.');
      }

      document.getElementById('successOverlay').classList.add('show');
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '서명 완료';
    }
  }

  // --- Utilities ---
  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function formatDate(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일';
  }

  function formatDateTime(isoStr) {
    if (!isoStr) return '';
    var d = new Date(isoStr);
    return d.getFullYear() + '년 ' + (d.getMonth() + 1) + '월 ' + d.getDate() + '일 ' +
      String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
  }

  function formatPhone(phone) {
    var digits = phone.replace(/\D/g, '');
    if (digits.length === 11) {
      return digits.slice(0, 3) + '-' + digits.slice(3, 7) + '-' + digits.slice(7);
    }
    if (digits.length === 10) {
      return digits.slice(0, 3) + '-' + digits.slice(3, 6) + '-' + digits.slice(6);
    }
    return phone;
  }
})();
</script>
