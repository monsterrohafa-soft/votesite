<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 페이지</title>
  <script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }

    /* 로그인 */
    .login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .login-box { background: #fff; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .login-box h1 { font-size: 22px; margin-bottom: 8px; text-align: center; }
    .login-box p { color: #888; font-size: 14px; text-align: center; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
    .form-group input, .form-group select { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; outline: none; transition: border 0.2s; background: #fff; }
    .form-group input:focus, .form-group select:focus { border-color: #333; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary { background: #1a1a1a; color: #fff; margin-top: 8px; }
    .btn-primary:hover { opacity: 0.85; }
    .error-msg { color: #e53e3e; font-size: 13px; text-align: center; margin-top: 12px; display: none; }

    /* 대시보드 */
    .dashboard { display: none; max-width: 800px; margin: 0 auto; padding: 20px; }
    .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .dash-header h2 { font-size: 18px; }
    .dash-header span { color: #888; font-size: 13px; }
    .btn-logout { padding: 8px 16px; border: 1px solid #ddd; border-radius: 8px; background: #fff; font-size: 13px; cursor: pointer; }
    .btn-logout:hover { background: #f5f5f5; }

    /* 탭 */
    .tabs { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn { flex: 1; min-width: 70px; padding: 10px 8px; border: 1px solid #ddd; border-radius: 10px; background: #fff; font-size: 13px; font-weight: 600; cursor: pointer; text-align: center; transition: all 0.2s; }
    .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* 통계 카드 */
    .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .stat-card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; }
    .stat-card .number { font-size: 32px; font-weight: 800; color: #1a1a1a; }
    .stat-card .label { font-size: 13px; color: #888; margin-top: 4px; }
    .stat-chart { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .stat-chart h3 { font-size: 14px; margin-bottom: 16px; color: #555; }
    .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
    .chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .chart-bar .bar { width: 100%; background: #1a1a1a; border-radius: 4px 4px 0 0; min-height: 4px; transition: height 0.3s; }
    .chart-bar .bar-label { font-size: 10px; color: #888; margin-top: 4px; }
    .chart-bar .bar-count { font-size: 11px; font-weight: 600; margin-bottom: 2px; }

    /* 사진 관리 */
    .upload-section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .upload-section h3 { font-size: 15px; margin-bottom: 16px; }
    .upload-options { display: flex; gap: 12px; margin-bottom: 16px; align-items: flex-end; }
    .upload-options .form-group { flex: 1; margin-bottom: 0; }
    .upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 32px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s; }
    .upload-area:hover, .upload-area.dragover { border-color: #1a1a1a; background: #fafafa; }
    .upload-area p { color: #888; font-size: 14px; }
    .upload-area .icon { font-size: 36px; margin-bottom: 8px; }
    .upload-area .compress-info { font-size: 11px; color: #aaa; margin-top: 6px; }
    .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
    .gallery-card { position: relative; border-radius: 10px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .gallery-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; }
    .gallery-card .overlay { position: absolute; top: 0; right: 0; padding: 6px; }
    .gallery-card .cat-badge { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .btn-delete { width: 28px; height: 28px; border: none; border-radius: 50%; background: rgba(0,0,0,0.6); color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-delete:hover { background: #e53e3e; }
    .gallery-card .alt-text { padding: 6px 8px; font-size: 11px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* 일정 관리 */
    .schedule-form { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .schedule-form h3 { font-size: 15px; margin-bottom: 16px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-row.full { grid-template-columns: 1fr; }
    .schedule-list { display: flex; flex-direction: column; gap: 10px; }
    .schedule-card { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .schedule-card .info { flex: 1; }
    .schedule-card .date { font-size: 13px; color: #888; margin-bottom: 4px; }
    .schedule-card .title { font-weight: 600; font-size: 15px; }
    .schedule-card .location { font-size: 13px; color: #666; margin-top: 2px; }
    .btn-sm { padding: 8px 14px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-add { background: #1a1a1a; color: #fff; }
    .btn-add:hover { opacity: 0.85; }

    /* QR */
    .qr-section { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); text-align: center; }
    .qr-section h3 { font-size: 15px; margin-bottom: 8px; }
    .qr-section .url-text { font-size: 12px; color: #888; margin-bottom: 16px; word-break: break-all; }
    .qr-canvas { margin: 0 auto 16px; }
    .btn-download { display: inline-block; padding: 10px 24px; background: #1a1a1a; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; }
    .btn-download:hover { opacity: 0.85; }

    .empty-state { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }
    .loading { text-align: center; padding: 20px; color: #888; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 10px; font-size: 14px; transition: transform 0.3s ease; z-index: 999; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .uploading { pointer-events: none; opacity: 0.5; }

    /* 공약 관리 */
    .pledge-form { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .pledge-form h3 { font-size: 15px; margin-bottom: 16px; }
    .pledge-form textarea { width: 100%; padding: 12px 14px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; resize: vertical; min-height: 80px; font-family: inherit; }
    .pledge-form textarea:focus { border-color: #333; }
    .pledge-list { display: flex; flex-direction: column; gap: 12px; }
    .pledge-card { background: #fff; border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
    .pledge-card .pledge-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .pledge-card .pledge-title { font-size: 16px; font-weight: 700; }
    .pledge-card .pledge-desc { font-size: 13px; color: #888; margin-bottom: 8px; }
    .pledge-card .pledge-details { font-size: 13px; color: #555; padding-left: 16px; }
    .pledge-card .pledge-details li { margin-bottom: 4px; }
    .pledge-card .pledge-actions { display: flex; gap: 6px; }
    .btn-edit { width: 28px; height: 28px; border: 1px solid #ddd; border-radius: 50%; background: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-edit:hover { background: #f0f0f0; }

    /* 연락처 관리 */
    .contact-form { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .contact-form h3 { font-size: 15px; margin-bottom: 16px; }
    .contact-list { display: flex; flex-direction: column; gap: 10px; }
    .contact-card { display: flex; justify-content: space-between; align-items: center; background: #fff; border-radius: 10px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .contact-card .contact-info { display: flex; align-items: center; gap: 12px; flex: 1; }
    .contact-card .contact-icon { width: 40px; height: 40px; border-radius: 50%; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #555; }
    .contact-card .contact-detail { flex: 1; }
    .contact-card .contact-type { font-size: 11px; color: #aaa; text-transform: uppercase; }
    .contact-card .contact-value { font-size: 14px; font-weight: 600; }
    .contact-card .contact-actions { display: flex; gap: 6px; }

    /* 영상 관리 */
    .video-form { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .video-form h3 { font-size: 15px; margin-bottom: 16px; }
    .video-list-admin { display: flex; flex-direction: column; gap: 12px; }
    .video-card-admin { display: flex; gap: 14px; background: #fff; border-radius: 10px; padding: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .video-card-admin .thumb { width: 120px; height: 68px; border-radius: 8px; overflow: hidden; flex-shrink: 0; background: #eee; }
    .video-card-admin .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .video-card-admin .video-info { flex: 1; }
    .video-card-admin .video-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
    .video-card-admin .video-desc { font-size: 12px; color: #888; }
    .video-card-admin .video-actions { display: flex; gap: 6px; align-self: flex-start; }
  </style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginView">
  <div class="login-box">
    <h1>관리자 로그인</h1>
    <p>후보 코드와 비밀번호를 입력하세요</p>
    <div class="form-group">
      <label>후보 코드</label>
      <input type="text" id="loginCode" placeholder="예: jdm" autocomplete="off">
    </div>
    <div class="form-group">
      <label>비밀번호</label>
      <input type="password" id="loginPw" placeholder="비밀번호 입력">
    </div>
    <button class="btn btn-primary" onclick="doLogin()">로그인</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<!-- 대시보드 -->
<div class="dashboard" id="dashView">
  <div class="dash-header">
    <div>
      <h2 id="dashName"></h2>
      <span id="dashParty"></span>
    </div>
    <button class="btn-logout" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="stats" onclick="switchTab('stats')">통계</button>
    <button class="tab-btn" data-tab="gallery" onclick="switchTab('gallery')">사진</button>
    <button class="tab-btn" data-tab="schedule" onclick="switchTab('schedule')">일정</button>
    <button class="tab-btn" data-tab="pledges" onclick="switchTab('pledges')">공약</button>
    <button class="tab-btn" data-tab="contacts" onclick="switchTab('contacts')">연락처</button>
    <button class="tab-btn" data-tab="videos" onclick="switchTab('videos')">영상</button>
    <button class="tab-btn" data-tab="qr" onclick="switchTab('qr')">QR코드</button>
  </div>

  <!-- 통계 탭 -->
  <div class="tab-content active" id="tab-stats">
    <div class="stat-cards">
      <div class="stat-card">
        <div class="number" id="statTotal">-</div>
        <div class="label">총 방문자</div>
      </div>
      <div class="stat-card">
        <div class="number" id="statToday">-</div>
        <div class="label">오늘 방문자</div>
      </div>
    </div>
    <div class="stat-chart">
      <h3>최근 7일 방문자</h3>
      <div class="chart-bars" id="chartBars"></div>
    </div>
  </div>

  <!-- 사진 탭 -->
  <div class="tab-content" id="tab-gallery">
    <div class="upload-section">
      <h3>사진 업로드</h3>
      <div class="upload-options">
        <div class="form-group">
          <label>카테고리</label>
          <select id="uploadCategory">
            <option value="activity">의정활동</option>
            <option value="campaign">선거운동</option>
            <option value="event">행사</option>
            <option value="media">언론/미디어</option>
          </select>
        </div>
      </div>
      <div class="upload-area" id="uploadArea">
        <div class="icon">+</div>
        <p>사진을 드래그하거나 클릭하여 업로드</p>
        <div class="compress-info">자동 압축: 최대 1200px, JPG 85% 품질로 변환</div>
      </div>
    </div>
    <input type="file" id="fileInput" accept="image/*" multiple hidden>
    <div id="galleryList" class="gallery-grid"></div>
  </div>

  <!-- 일정 탭 -->
  <div class="tab-content" id="tab-schedule">
    <div class="schedule-form">
      <h3>새 일정 추가</h3>
      <div class="form-row">
        <div class="form-group">
          <label>날짜</label>
          <input type="date" id="schDate">
        </div>
        <div class="form-group">
          <label>시간</label>
          <input type="time" id="schTime">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="schTitle" placeholder="예: 거리유세">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>장소</label>
          <input type="text" id="schLocation" placeholder="예: 서면역 앞">
        </div>
      </div>
      <button class="btn-sm btn-add" onclick="addSchedule()">일정 추가</button>
    </div>
    <div id="scheduleList" class="schedule-list"></div>
  </div>

  <!-- 공약 탭 -->
  <div class="tab-content" id="tab-pledges">
    <div class="pledge-form" id="pledgeFormWrap">
      <h3 id="pledgeFormTitle">새 공약 추가</h3>
      <input type="hidden" id="pledgeEditId">
      <div class="form-row full">
        <div class="form-group">
          <label>아이콘</label>
          <select id="pledgeIcon">
            <option value="fas fa-rocket">🚀 산업/미래</option>
            <option value="fas fa-hand-holding-heart">❤️ 복지/돌봄</option>
            <option value="fas fa-route">🛣️ 교통</option>
            <option value="fas fa-palette">🎨 문화/관광</option>
            <option value="fas fa-brain">🧠 AI/스마트</option>
            <option value="fas fa-shield-alt">🛡️ 안전</option>
            <option value="fas fa-graduation-cap">🎓 교육</option>
            <option value="fas fa-store">🏪 경제/일자리</option>
            <option value="fas fa-users">👥 행정/참여</option>
            <option value="fas fa-bullhorn">📢 기타</option>
          </select>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="pledgeTitle" placeholder="예: 미래산업 관문">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>설명</label>
          <input type="text" id="pledgeDesc" placeholder="예: 일자리가 넘치는 역동적인 도시">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>세부 항목 (한 줄에 하나씩)</label>
          <textarea id="pledgeDetails" placeholder="AI 기반 혁신산업 유치&#10;청년 창업 지원&#10;소상공인 디지털 전환"></textarea>
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm btn-add" id="pledgeSubmitBtn" onclick="submitPledge()">공약 추가</button>
        <button class="btn-sm" id="pledgeCancelBtn" onclick="cancelPledgeEdit()" style="display:none;background:#ddd;">취소</button>
      </div>
    </div>
    <div id="pledgeList" class="pledge-list"></div>
  </div>

  <!-- 연락처 탭 -->
  <div class="tab-content" id="tab-contacts">
    <div class="contact-form" id="contactFormWrap">
      <h3 id="contactFormTitle">새 연락처 추가</h3>
      <input type="hidden" id="contactEditId">
      <div class="form-row">
        <div class="form-group">
          <label>타입</label>
          <select id="contactType">
            <option value="phone">📞 전화</option>
            <option value="email">📧 이메일</option>
            <option value="address">📍 주소</option>
            <option value="instagram">📷 인스타그램</option>
            <option value="facebook">👤 페이스북</option>
            <option value="youtube">▶️ 유튜브</option>
            <option value="blog">📝 블로그</option>
          </select>
        </div>
        <div class="form-group">
          <label>라벨</label>
          <input type="text" id="contactLabel" placeholder="예: 선거사무소">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>값</label>
          <input type="text" id="contactValue" placeholder="예: 010-1234-5678">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>링크 URL (선택)</label>
          <input type="text" id="contactUrl" placeholder="예: tel:010-1234-5678 또는 https://...">
        </div>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm btn-add" id="contactSubmitBtn" onclick="submitContact()">연락처 추가</button>
        <button class="btn-sm" id="contactCancelBtn" onclick="cancelContactEdit()" style="display:none;background:#ddd;">취소</button>
      </div>
    </div>
    <div id="contactList" class="contact-list"></div>
  </div>

  <!-- 영상 탭 -->
  <div class="tab-content" id="tab-videos">
    <div class="video-form" id="videoFormWrap">
      <h3 id="videoFormTitle">새 영상 추가</h3>
      <input type="hidden" id="videoEditId">
      <div class="form-row full">
        <div class="form-group">
          <label>유튜브 URL 또는 영상 ID</label>
          <input type="text" id="videoUrl" placeholder="예: https://youtu.be/abc123 또는 abc123">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>제목</label>
          <input type="text" id="videoTitle" placeholder="영상 제목">
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>설명 (선택)</label>
          <input type="text" id="videoDesc" placeholder="영상 설명">
        </div>
      </div>
      <div id="videoPreview" style="margin-bottom:12px;display:none;">
        <img id="videoThumb" style="width:200px;border-radius:8px;" alt="미리보기">
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn-sm btn-add" id="videoSubmitBtn" onclick="submitVideo()">영상 추가</button>
        <button class="btn-sm" id="videoCancelBtn" onclick="cancelVideoEdit()" style="display:none;background:#ddd;">취소</button>
      </div>
    </div>
    <div id="videoList" class="video-list-admin"></div>
  </div>

  <!-- QR코드 탭 -->
  <div class="tab-content" id="tab-qr">

});

// 이미지 압축 (Canvas API)
function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      let w = img.width;
      let h = img.height;
      if (w > maxWidth) {
        h = Math.round(h * maxWidth / w);
        w = maxWidth;
      }
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(resolve, 'image/jpeg', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function handleFiles(files) {
  const category = document.getElementById('uploadCategory').value;
  uploadArea.classList.add('uploading');
  uploadArea.querySelector('p').textContent = '업로드 중...';

  for (const file of files) {
    if (!file.type.startsWith('image/')) continue;
    try {
      // 이미지 압축 (1200px, 85% quality)
      const compressed = await compressImage(file, 1200, 0.85);

      const res = await fetch(`${API}/gallery-upload`, {
        method: 'POST',
        headers: {
          'Content-Type': 'image/jpeg',
          'Authorization': `Bearer ${token}`,
          'X-Alt': file.name.replace(/\.[^.]+$/, ''),
          'X-Category': category,
        },
        body: compressed,
      });
      if (!res.ok) {
        const data = await res.json();
        showToast(data.error || '업로드 실패');
        continue;
      }
      showToast('업로드 완료');
    } catch {
      showToast('업로드 중 오류 발생');
    }
  }

  uploadArea.classList.remove('uploading');
  uploadArea.querySelector('p').textContent = '사진을 드래그하거나 클릭하여 업로드';
  fileInput.value = '';
  loadGallery();
}

function extractVideoId(input) {
  if (!input) return '';
  // youtu.be/xxx, youtube.com/watch?v=xxx, youtube.com/embed/xxx
  const patterns = [
    /youtu\.be\/([^?&]+)/,
    /[?&]v=([^?&]+)/,
    /\/embed\/([^?&]+)/,
    /^([a-zA-Z0-9_-]{11})$/
  ];
  for (const p of patterns) {
    const m = input.match(p);
    if (m) return m[1];
  }
  return input.trim();
}

    thumb.src = `https://img.youtube.com/vi/${vid}/hqdefault.jpg`;

  document.getElementById('videoFormTitle').textContent = '새 영상 추가';
  document.getElementById('videoSubmitBtn').textContent = '영상 추가';
  document.getElementById('videoCancelBtn').style.display = 'none';
}

async function deleteVideo(id) {
  if (!confirm('이 영상을 삭제하시겠습니까?')) return;
  try {
    const res = await fetch(`${API}/videos?id=${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` },
    });
    if (res.ok) { showToast('삭제 완료'); loadVideos(); }
  } catch { showToast('삭제 실패'); }
}

// ========== QR코드 ==========
let qrInstance = null;

function generateQR() {
  const siteUrl = `${location.origin}/${code}/`;
  document.getElementById('qrUrl').textContent = siteUrl;

  qrInstance = new QRious({
    element: document.getElementById('qrCanvas'),
    value: siteUrl,
    size: 480,
    level: 'H',
    foreground: '#1a1a1a',
    background: '#ffffff',
    padding: 0
  });
}

function downloadQR() {
  const canvas = document.getElementById('qrCanvas');
  if (!canvas) { showToast('QR코드를 찾을 수 없습니다'); return; }
  const link = document.createElement('a');
  link.download = `qrcode_${code}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// 토스트
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
